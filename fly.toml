app = "ticketuno"
primary_region = "fra"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"
  DB_PATH = "/data/ticketuno.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "5s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/v1/health"

[mounts]
  source = "ticketuno_data"
  destination = "/data"
  initial_size = "1gb"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
