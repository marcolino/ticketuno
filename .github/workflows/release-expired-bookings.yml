name: Release expired bookings

on:
  schedule:
    # Every 10 minutes, around the clock
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger release-expired-bookings endpoint
        run: |
          curl -f -X POST https://ticketuno.fly.dev/api/v1/internal/release-expired-bookings \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 30 \
            --silent

# To test this job: CRON_SECRET="***" && curl -f -X POST https://ticketuno.fly.dev/api/v1/internal/release-expired-bookings -H "Authorization: Bearer $CRON_SECRET" -H "Content-Type: application/json" --silent