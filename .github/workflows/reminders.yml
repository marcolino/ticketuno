name: Send booking reminders

on:
  schedule:
    # Top of every hour
    - cron: '0 * * * *'
  # Also allows manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder endpoint
        run: |
          curl -f -X POST https://ticketuno.fly.dev/api/v1/internal/send-reminders \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 30
